<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Macondo&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="./public/favicon.png" type="image/png" />
    <link rel="stylesheet" href="./style.css" />
    <script defer type="module" src="./script.js"></script>
    <title>Barber Landing Page</title>
  </head>
  <body>
    <header>
      <a href="/">
        <img src="public/logo.png" alt="Barber Logo" class="logo" />
      </a>

      <nav><ul id="nav-links" class="nav-links"></ul></nav>

      <button id="menu-toggle" class="menu-toggle">
        <img src="public/icons/menu.png" alt="Menu Icon" class="icon" />
      </button>

      <nav id="mobile-nav" class="mobile-nav hidden">
        <button type="button" id="mobile-nav-close" class="mobile-nav-close">
          <img src="public/icons/x.png" alt="Close Icon" class="icon" />
        </button>

        <ul id="mobile-nav-links" class="mobile-nav-links"></ul>
      </nav>
    </header>

    <section class="hero-section">
      <h1>BARBERS & HAIR CUTTING</h1>
      <h2>Látogass el hozzánk, profi borbélyaink állnak szolgálatodra!</h2>

      <div class="contact-info">
        <div class="phone-info">
          <img src="public/icons/phone.svg" alt="Phone Icon" class="icon" />

          <p>Hívj minket: +36 12 123 4567</p>
        </div>

        <button type="button" class="apointment-btn">Időpont foglalás</button>
      </div>
    </section>
  </body>
</html>
